{% extends "base.html" %}

{% block title %}Редактирование профиля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card card-soft">
            <div class="card-body p-4 p-md-5">
                <h1 class="h3 text-primary mb-4">Редактирование профиля</h1>

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="{{ form.full_name.id_for_label }}" class="form-label">ФИО</label>
                        {{ form.full_name }}
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.bio.id_for_label }}" class="form-label">Информация о себе</label>
                        {{ form.bio }}
                    </div>

                    <div class="mb-4">
                        <label for="{{ form.photo.id_for_label }}" class="form-label">Фотография профиля</label>
                        {{ form.photo }}
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                        <a href="/accounts/profile/" class="btn btn-outline-secondary">Назад</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
